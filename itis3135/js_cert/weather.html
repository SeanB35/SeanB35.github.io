<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Beaver | Conditions Monitor</title>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../styles/js_cert.css">
    <style>
        /* Specific styles for the weather dashboard */
        #weather-display {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        #weather-icon {
            width: 80px;
            height: 80px;
            display: block;
            margin: 0 auto;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding: 5px 0;
        }
    </style>
</head>

<body>
    <header>
        <h1>Super Beaver's Secure Lodge</h1>
    </header>

    <main>
        <div data-include="header.html"></div>

        <h2>Habitat Conditions Monitor</h2>

        <div class="app-container">
            <select id="city-select">
                <option value="">Select a habitat...</option>
                <option value="new york">Concrete River (New York)</option>
                <option value="los angeles">Dry Brush (Los Angeles)</option>
                <option value="chicago">Windy Dam (Chicago)</option>
                <option value="paris">Seine Waterway (Paris)</option>
                <option value="tokyo">Neon Stream (Tokyo)</option>
                <option value="london">Foggy Thames (London)</option>
            </select>
            <button id="get-weather-btn">Scan Environment</button>

            <div id="weather-display">
                <h3 id="location" style="text-align: center; margin-top: 0; color: var(--accent-blue);">Awaiting
                    Target...</h3>
                <img id="weather-icon" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
                    alt="Weather Icon" style="display: none;">

                <div class="data-row"><span>Status:</span> <strong id="weather-main">N/A</strong></div>
                <div class="data-row"><span>Temp:</span> <strong id="main-temperature">N/A</strong>°C</div>
                <div class="data-row"><span>Feels Like:</span> <strong id="feels-like">N/A</strong>°C</div>
                <div class="data-row"><span>Humidity:</span> <strong id="humidity">N/A</strong>%</div>
                <div class="data-row"><span>Wind Speed:</span> <strong id="wind">N/A</strong> m/s</div>
                <div class="data-row"><span>Wind Gust:</span> <strong id="wind-gust">N/A</strong> m/s</div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Super Beaver Operations. All systems secure.</p>
    </footer>

    <script>
        const citySelect = document.getElementById('city-select');
        const weatherBtn = document.getElementById('get-weather-btn');

        const locationEl = document.getElementById('location');
        const weatherIcon = document.getElementById('weather-icon');
        const weatherMain = document.getElementById('weather-main');
        const mainTemp = document.getElementById('main-temperature');
        const feelsLike = document.getElementById('feels-like');
        const humidity = document.getElementById('humidity');
        const wind = document.getElementById('wind');
        const windGust = document.getElementById('wind-gust');

        weatherBtn.addEventListener('click', async () => {
            const city = citySelect.value;
            if (!city) {
                locationEl.innerText = "Error: Select a habitat first!";
                return;
            }

            locationEl.innerText = "Scanning...";

            try {
                // Using wttr.in — free, no API key required
                const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
                if (!response.ok) throw new Error("Network response was not ok");

                const data = await response.json();
                const current = data.current_condition[0];

                locationEl.innerText = `${data.nearest_area[0].areaName[0].value}, ${data.nearest_area[0].country[0].value}`;

                weatherMain.innerText = current.weatherDesc[0].value;
                mainTemp.innerText = current.temp_C;
                feelsLike.innerText = current.FeelsLikeC;
                humidity.innerText = current.humidity;
                wind.innerText = (parseFloat(current.windspeedKmph) / 3.6).toFixed(1);
                windGust.innerText = current.WindGustKmph
                    ? (parseFloat(current.WindGustKmph) / 3.6).toFixed(1)
                    : "N/A";

                // Show weather icon
                const iconUrl = current.weatherIconUrl && current.weatherIconUrl[0] && current.weatherIconUrl[0].value;
                if (iconUrl) {
                    weatherIcon.src = iconUrl;
                    weatherIcon.style.display = 'block';
                } else {
                    weatherIcon.style.display = 'none';
                }

            } catch (err) {
                locationEl.innerText = "Error: Could not fetch conditions.";
                console.error(err);
            }
        });
    </script>
    <div data-include=" footer.html"></div>
    <script src="../scripts/HTMLInclude.min.js"></script>
</body>

</html>
