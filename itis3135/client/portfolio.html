<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse the cinematic photography portfolio — street, portrait, landscape, and editorial work.">
    <title>Portfolio — Peter Bivona Photography</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ====== NAVIGATION ====== -->
    <div id="header-placeholder"></div>

    <div class="nav-spacer"></div>

    <!-- ====== GALLERY ====== -->
    <main class="section">
        <h1 class="section-title">The Work</h1>
        <p class="section-subtitle">A curated collection of cinematic moments.</p>
        <div class="section-divider"></div>

        <div class="container">
            <!-- Filter Bar -->
            <div id="filter-bar" class="filter-bar reveal">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="landscape">Landscape</button>
                <button class="filter-btn" data-category="urban">Urban</button>
                <button class="filter-btn" data-category="nature">Nature</button>
            </div>

            <div class="gallery-grid" id="gallery-grid">

                <div class="gallery-item reveal" data-index="0" data-category="landscape">
                    <img src="images/DSC06165.webp" alt="Portrait in golden hour light">
                    <div class="overlay"><span>Western Coast</span></div>
                </div>

                <div class="gallery-item reveal" data-index="1" data-category="urban">
                    <img src=images/DSC06009.webp alt="Urban street at night with neon reflections">
                    <div class="overlay"><span>Golden Hour</span></div>
                </div>

                <div class="gallery-item reveal" data-index="2" data-category="urban">
                    <img src="images/traintracks.webp" alt="Misty forest landscape">
                    <div class="overlay"><span>Urban Train</span></div>
                </div>

                <div class="gallery-item reveal" data-index="3" data-category="landscape">
                    <img src=images/DSC09751-Edit-2-Edit.webp alt="Close-up editorial portrait">
                    <div class="overlay"><span>Grassy Mountain</span></div>
                </div>

                <div class="gallery-item reveal" data-index="4" data-category="nature">
                    <img src="images/stars.webp" alt="Moody cityscape at dusk">
                    <div class="overlay"><span>Night Sky</span></div>
                </div>

                <div class="gallery-item reveal" data-index="5" data-category="nature">
                    <img src="images/house.webp" alt="Silhouette against dramatic sky">
                    <div class="overlay"><span>Log Cabin</span></div>
                </div>

                <div class="gallery-item reveal" data-index="6" data-category="nature">
                    <img src="images/river.webp" alt="Motion blur in urban environment">
                    <div class="overlay"><span>River</span></div>
                </div>

                <div class="gallery-item reveal" data-index="7" data-category="nature">
                    <img src="images/lake.webp" alt="Environmental portrait in gritty alley">
                    <div class="overlay"><span>Snowy Landscap</span></div>
                </div>

                <div class="gallery-item reveal" data-index="8" data-category="landscape">
                    <img src="images/mountain.webp" alt="Wide landscape with dramatic clouds">
                    <div class="overlay"><span>Mountain</span></div>
                </div>

            </div>
        </div>
    </main>

    <!-- ====== LIGHTBOX ====== -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close lightbox">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous image">&#8249;</button>
        <img src="" alt="Full-size photograph" id="lightbox-img">
        <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next image">&#8250;</button>
    </div>

    <!-- ====== FOOTER ====== -->
    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
</body>
</html>
